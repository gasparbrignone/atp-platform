name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload the site
        # package.json requires Node >=22.12.0 (see "engines"); this action
        # defaults to Node 20 otherwise, which doesn't satisfy that.
        uses: withastro/action@v3
        with:
          node-version: 22
        env:
          # Server-only en Astro (sin prefijo PUBLIC_, ver src/env.d.ts):
          # se usa en build time para pedir los últimos videos del canal
          # de YouTube (src/lib/youtube.ts) y nunca llega al bundle del
          # cliente. Ver docs/YOUTUBE_SETUP.md para crearla.
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
