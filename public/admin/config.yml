# Panel de edición de contenido (Sveltia CMS, sucesor de Decap CMS — ver
# docs/CMS_SETUP.md sobre por qué). Login con un Personal Access Token de
# GitHub (botón "Sign In with Token" en /admin): no hace falta OAuth App,
# Netlify ni ningún proxy propio. Ver docs/CMS_SETUP.md para cómo generarlo
# y cómo probar esto en local sin necesitar nada de eso.

backend:
  name: github
  repo: gasparbrignone/atp-platform
  branch: main

media_folder: public/uploads
public_folder: /uploads

# Sin esto, un campo opcional vacío se guarda como `null` — y nuestros
# schemas Zod son `.optional()` (aceptan que falte la clave), no `.nullable()`
# (no aceptan `null` explícito). Con esto, un campo opcional vacío
# directamente no se escribe, que es lo que ya esperan los schemas.
omit_empty_optional_fields: true

# Config global de generación de slugs (solo aplica al crear una entrada
# nueva — ver nota en cada colección de abajo). Sin acentos/espacios para que
# el nombre de archivo quede estable y portable.
slug:
  encoding: 'ascii'
  clean_accents: true
  sanitize_replacement: '-'

collections:
  # `slug: '{{slug}}'` solo define el nombre de archivo en el momento de
  # CREAR la entrada (a partir del título). Editar el título después NO
  # renombra el archivo ni cambia `entry.id` en Astro — el slug y el título
  # quedan desacoplados una vez creada la entrada. Es el comportamiento por
  # default del CMS, documentado acá para que quede explícito.
  - name: activities
    label: Actividades
    folder: src/content/activities
    create: true
    delete: true
    slug: '{{slug}}'
    extension: json
    format: json
    fields:
      - { label: Título, name: title, widget: string }
      - { label: Resumen, name: summary, widget: text }
      - { label: Descripción, name: description, widget: text, required: false }
      - { label: Foto, name: image, widget: image, required: false }
      - {
          label: '¿Se repite todas las semanas?',
          name: recurring,
          widget: boolean,
          default: false,
          hint: 'Activalo para algo como un grupo de estudio semanal. Si lo activás, completá "Día de la semana" en vez de "Fecha".',
        }
      - {
          label: Día de la semana,
          name: weekday,
          widget: select,
          required: false,
          hint: 'Solo si "¿Se repite todas las semanas?" está activado.',
          options:
            [
              { label: Lunes, value: lunes },
              { label: Martes, value: martes },
              { label: Miércoles, value: miercoles },
              { label: Jueves, value: jueves },
              { label: Viernes, value: viernes },
              { label: Sábado, value: sabado },
              { label: Domingo, value: domingo },
            ],
        }
      - {
          label: Fecha,
          name: date,
          widget: datetime,
          required: false,
          format: 'YYYY-MM-DD',
          date_format: true,
          time_format: false,
          picker_utc: true,
          hint: 'Solo para una actividad puntual. No hace falta si "¿Se repite todas las semanas?" está activado.',
        }
      - {
          label: Hora de inicio,
          name: time,
          widget: string,
          required: false,
          pattern: ['^([01]\d|2[0-3]):[0-5]\d$', 'Formato HH:MM en 24hs, ej: 08:00 o 19:45'],
        }
      - {
          label: Hora de fin,
          name: endTime,
          widget: string,
          required: false,
          hint: 'Opcional, para mostrar un rango (ej. "14:00 a 16:00hs").',
          pattern: ['^([01]\d|2[0-3]):[0-5]\d$', 'Formato HH:MM en 24hs, ej: 16:00'],
        }
      - { label: Lugar, name: location, widget: string, required: false }
      - {
          label: Clases,
          name: sessions,
          widget: list,
          required: false,
          hint: 'Solo para una actividad compuesta por varios encuentros (ej. "Semana de repasos CyD"). Si cargás clases acá, no hace falta completar Fecha/Hora arriba: cada clase tiene su propio día y horario.',
          summary: '{{title}}',
          fields:
            [
              { label: Título, name: title, widget: string },
              {
                label: Día de la semana,
                name: weekday,
                widget: select,
                required: false,
                options:
                  [
                    { label: Lunes, value: lunes },
                    { label: Martes, value: martes },
                    { label: Miércoles, value: miercoles },
                    { label: Jueves, value: jueves },
                    { label: Viernes, value: viernes },
                    { label: Sábado, value: sabado },
                    { label: Domingo, value: domingo },
                  ],
              },
              {
                label: Hora de inicio,
                name: time,
                widget: string,
                required: false,
                pattern: ['^([01]\d|2[0-3]):[0-5]\d$', 'Formato HH:MM en 24hs, ej: 08:00 o 19:45'],
              },
              {
                label: Hora de fin,
                name: endTime,
                widget: string,
                required: false,
                pattern: ['^([01]\d|2[0-3]):[0-5]\d$', 'Formato HH:MM en 24hs, ej: 16:00'],
              },
              { label: Lugar, name: location, widget: string, required: false },
            ],
        }
      - { label: Estado, name: status, widget: select, options: [proxima, activa, finalizada] }
      - {
          label: Link de inscripción,
          name: registrationUrl,
          widget: string,
          required: false,
          hint: 'Debe empezar con http:// o https://. Dejalo vacío si no hay inscripción externa.',
        }
      - { label: Destacada, name: featured, widget: boolean, default: false }
      - { label: Publicada, name: published, widget: boolean, default: true }
      - { label: Orden, name: order, widget: number, required: false, value_type: int }

  - name: books
    label: Biblioteca
    folder: src/content/books
    create: true
    delete: true
    slug: '{{slug}}'
    extension: json
    format: json
    fields:
      - { label: Título, name: title, widget: string }
      - { label: Autor, name: author, widget: string }
      - {
          label: Materia,
          name: subject,
          widget: relation,
          collection: subjects,
          value_field: '{{slug}}',
          search_fields: [name],
          display_fields: [name],
          hint: '¿No está la materia que buscás? Creala primero en "Materias" (menú de la izquierda) y después volvé acá a elegirla.',
        }
      - {
          label: Carreras,
          name: career,
          widget: select,
          multiple: true,
          options: [medicina, enfermeria, fonoaudiologia, terapia-ocupacional],
        }
      - {
          label: Tipo,
          name: resourceType,
          widget: relation,
          collection: resourceTypes,
          value_field: '{{slug}}',
          search_fields: [name],
          display_fields: [name],
          hint: '¿No está el tipo que buscás (ej. "Cuaderno del alumno")? Crealo primero en "Tipos de recurso" y después volvé acá a elegirlo.',
        }
      - {
          label: Link de Google Drive,
          name: driveUrl,
          widget: string,
          required: false,
          hint: 'Pegá acá el link para compartir de Google Drive (que cualquiera con el link pueda verlo, empezando con http:// o https://). En unos minutos el sitio lo migra solo a una descarga directa y completa "Link de descarga" — no lo completes vos a mano.',
        }
      - {
          label: Link de descarga,
          name: downloadUrl,
          widget: string,
          required: false,
          hint: 'Se completa solo a partir del "Link de Google Drive" de arriba. No hace falta tocarlo ni completarlo a mano.',
        }
      - { label: Publicado, name: published, widget: boolean, default: true }
      # Sin consumidor todavía en ninguna página — solo se prepara el campo
      # para cuando haya portadas reales (ver content.config.ts).
      - { label: Portada, name: cover, widget: image, required: false }
      - { label: Orden, name: order, widget: number, required: false, value_type: int }

  - name: subjects
    label: Materias
    folder: src/content/subjects
    create: true
    delete: true
    slug: '{{slug}}'
    extension: json
    format: json
    fields:
      - { label: Nombre, name: name, widget: string }
      - { label: Orden, name: order, widget: number, required: false, value_type: int }

  - name: resourceTypes
    label: Tipos de recurso
    folder: src/content/resourceTypes
    create: true
    delete: true
    slug: '{{slug}}'
    extension: json
    format: json
    fields:
      - { label: Nombre, name: name, widget: string }
      - { label: Orden, name: order, widget: number, required: false, value_type: int }

  # create/delete en false a propósito: los íconos por carrera están
  # hardcodeados por slug en src/pages/carreras/index.astro y
  # src/pages/index.astro — una carrera nueva creada desde acá quedaría sin
  # ícono mapeado. Agregar una carrera nueva sigue siendo una tarea de código.
  - name: careers
    label: Carreras
    folder: src/content/careers
    create: false
    delete: false
    extension: json
    format: json
    fields:
      - { label: Nombre, name: name, widget: string }
      - { label: Descripción, name: description, widget: text, required: false }
      - {
          label: Instagram,
          name: instagram,
          widget: string,
          required: false,
          hint: 'Debe empezar con http:// o https://.',
        }
      - label: Herramientas
        name: tools
        widget: list
        fields:
          - { label: Nombre, name: name, widget: string }
          - {
              label: Descripción,
              name: description,
              widget: text,
              hint: 'Admite Markdown en línea: **negrita**, *cursiva*, [link](https://...).',
            }
          - { label: Foto, name: image, widget: image, required: false }
          - {
              label: Link,
              name: href,
              widget: string,
              required: false,
              hint: 'Debe empezar con http:// o https://.',
            }
          - {
              label: Ícono,
              name: icon,
              widget: select,
              options: [book-open, microscope, calendar-check],
            }
      - label: Recursos
        name: resources
        widget: list
        fields:
          - { label: Título, name: label, widget: string }
          - {
              label: Descripción,
              name: description,
              widget: text,
              required: false,
              hint: 'Opcional. Admite Markdown en línea: **negrita**, *cursiva*, [link](https://...).',
            }
          - { label: Foto, name: image, widget: image, required: false }
          # A diferencia de los demás links, este también admite rutas
          # internas del sitio (p. ej. "/biblioteca", ver el flag "Es
          # externo") — no se restringe a http(s) para no romper esos casos.
          - { label: Link, name: href, widget: string }
          - { label: Es externo, name: external, widget: boolean, default: false }

  - name: tools
    label: +info
    folder: src/content/tools
    create: true
    delete: true
    slug: '{{slug}}'
    extension: json
    format: json
    fields:
      - { label: Nombre, name: name, widget: string }
      - {
          label: Descripción,
          name: description,
          widget: markdown,
          buttons: [bold, italic, link],
          hint: 'Admite negrita, cursiva y links.',
        }
      - {
          label: URL,
          name: url,
          widget: string,
          required: false,
          hint: 'Opcional: solo si esta entrada lleva a un link externo. Si es solo texto para leer acá, dejalo vacío. Debe empezar con http:// o https://.',
        }
      - {
          label: Ícono,
          name: icon,
          widget: select,
          options: [book-open, microscope, calculator, activity, link],
        }
      - {
          label: Contenido extendido,
          name: content,
          widget: markdown,
          required: false,
          hint: 'Admite Markdown: títulos con #, listas, links, --- para separar secciones, y bloques de aviso con > [!NOTE], > [!TIP], > [!IMPORTANT], > [!WARNING] o > [!CAUTION].',
        }
      - label: Imágenes
        name: images
        widget: list
        required: false
        fields:
          - { label: Imagen, name: src, widget: image }
          - { label: Texto alternativo, name: alt, widget: string, hint: 'Describí la imagen para lectores de pantalla.' }
      - label: Recursos
        name: resources
        widget: list
        required: false
        fields:
          - { label: Título, name: label, widget: string }
          # A diferencia de otros links, este también admite rutas internas
          # del sitio (p. ej. "/biblioteca", ver el flag "Es externo") — no
          # se restringe a http(s) para no romper esos casos.
          - { label: Link, name: href, widget: string }
          - { label: Es externo, name: external, widget: boolean, default: false }
      - { label: Publicada, name: published, widget: boolean, default: true }
      - { label: Orden, name: order, widget: number, required: false, value_type: int }
