<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <!-- FESTIVAL ATP Logo — Composición asimétrica con formas orgánicas -->

  <!-- Estrella deformada detrás del texto -->
  <path d="M120 150 L140 80 L160 120 L220 60 L190 130 L260 140 L200 160 L230 230 L170 180 L130 250 L135 175 L60 190 L110 155 L50 110 L120 150Z" fill="#FF4FC6" opacity="0.9"/>

  <!-- Círculo celular -->
  <circle cx="680" cy="80" r="45" fill="none" stroke="#A4DAFF" stroke-width="3"/>
  <circle cx="680" cy="80" r="20" fill="#A4DAFF" opacity="0.4"/>
  <circle cx="672" cy="74" r="6" fill="#143A7B" opacity="0.6"/>

  <!-- Texto FESTIVAL -->
  <text x="140" y="155" font-family="Montserrat, sans-serif" font-weight="900" font-size="110" fill="#143A7B" letter-spacing="-4" text-anchor="start">FESTIVAL</text>

  <!-- Texto ATP — más grande, superpuesto -->
  <text x="420" y="260" font-family="Montserrat, sans-serif" font-weight="900" font-size="160" fill="#FF4FC6" letter-spacing="-6" text-anchor="start">ATP</text>

  <!-- Puntos moleculares -->
  <circle cx="90" cy="60" r="5" fill="#FF4FC6"/>
  <circle cx="70" cy="45" r="3" fill="#A4DAFF"/>
  <line x1="90" y1="60" x2="70" y2="45" stroke="#143A7B" stroke-width="1.5"/>
  <circle cx="105" cy="35" r="4" fill="#143A7B"/>
  <line x1="90" y1="60" x2="105" y2="35" stroke="#FF4FC6" stroke-width="1.5"/>

  <!-- Líneas radiales decorativas -->
  <g transform="translate(750, 220)" opacity="0.5">
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#143A7B" stroke-width="1.5"/>
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#143A7B" stroke-width="1.5"/>
    <line x1="-21" y1="-21" x2="21" y2="21" stroke="#143A7B" stroke-width="1.5"/>
    <line x1="21" y1="-21" x2="-21" y2="21" stroke="#143A7B" stroke-width="1.5"/>
  </g>
</svg>
