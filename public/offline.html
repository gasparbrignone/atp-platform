<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión — ATP</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 2rem;
        text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #fffdfe;
        color: #1a1720;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #16141c;
          color: #f5f3f7;
        }
      }

      img {
        width: 48px;
        height: 48px;
      }

      h1 {
        font-size: 1.25rem;
        margin: 0;
      }

      p {
        margin: 0;
        max-width: 32ch;
        opacity: 0.8;
      }

      button {
        margin-top: 0.5rem;
        border: none;
        border-radius: 999px;
        padding: 0.6rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        color: #fffdfe;
        background: #f969d7;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <img src="/favicon.svg" alt="" />
    <h1>Sin conexión</h1>
    <p>No pudimos cargar esta página. Revisá tu conexión a internet e intentá de nuevo.</p>
    <button onclick="location.reload()">Reintentar</button>
  </body>
</html>
